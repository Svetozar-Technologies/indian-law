name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - issue-1-983a320683f7
  workflow_dispatch:

jobs:
  test:
    name: Test and Offline Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build deterministic React Pages artifact
        run: node scripts/build-site.mjs --offline --output /tmp/indian-law-ci-offline-site

      - name: Discover one Central Act smoke sample
        run: >
          node scripts/discover-laws.mjs
          --limit 1
          --output /tmp/indian-law-ci-discovered.lino
          --delay-ms 0

      - name: Build one live law smoke sample
        run: >
          node scripts/build-site.mjs
          --fetch
          --manifest data/laws.seed.lino
          --regional-sources data/regional-sources.seed.lino
          --max-laws 1
          --max-sections 1
          --output /tmp/indian-law-ci-live-site
          --delay-ms 0

      - name: Download one official law corpus smoke sample
        run: >
          node scripts/smoke-download-source.mjs
          --manifest data/laws.seed.lino
          --max-sources 1
          --output /tmp/indian-law-ci-source
          --delay-ms 1100
