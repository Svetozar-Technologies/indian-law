name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - issue-1-983a320683f7
  workflow_dispatch:

jobs:
  test:
    name: Test and Offline Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build deterministic Pages artifact
        run: npm run build:offline

      - name: Verify generated Pages output is committed
        run: git diff --exit-code -- docs
